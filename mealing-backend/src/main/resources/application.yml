spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:mealing.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
  flyway:
    enabled: false

mealing:
  jwt:
    secret: ${JWT_SECRET:mealingSecretKey_ChangeInProduction_AtLeast256BitsLong!!}
    expiration: 86400000
  nutrition:
    default-tdee-multiplier: 1.55
  open-food-facts:
    base-url: https://world.openfoodfacts.org/api/v2
    timeout: 5000
  off-catalog:
    path: ${OFF_CATALOG_PATH:off_catalog.db}
  ciqual:
    csv-url: ${CIQUAL_CSV_URL:https://ciqual.anses.fr/cms/sites/default/files/inline-files/TableCIQUAL2020_FR_2020_07_07.csv}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.mealing: DEBUG
    org.springframework.security: INFO
