spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mealing}
    username: ${DB_USER:mealing}
    password: ${DB_PASSWORD:mealing}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mealing:
  jwt:
    secret: ${JWT_SECRET:mealingSecretKey_ChangeInProduction_AtLeast256BitsLong!!}
    expiration: 86400000
  nutrition:
    default-tdee-multiplier: 1.55
  open-food-facts:
    base-url: https://world.openfoodfacts.org/api/v2
    timeout: 5000

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.mealing: DEBUG
    org.springframework.security: INFO
